site_name: Scythe
repo_url: https://github.com/szvsw/scythe
site_url: https://szvsw.github.io/scythe
site_description: A lightweight library for running embarrassingly parallel experiments with Hatchet.
site_author: Sam Wolk
edit_uri: edit/main/docs/
repo_name: szvsw/scythe
copyright: Maintained by <a href="https://github.com/szvsw">Sam Wolk</a>.

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Scatter/Gather: concepts/scatter-gather.md
      - Experiment Lifecycle: concepts/experiment-lifecycle.md
  - Guides:
      - Defining Experiments: guides/defining-experiments.md
      - Running Experiments: guides/running-experiments.md
      - Workflow & Single-Run Experiments: guides/workflow-experiments.md
      - Workers: guides/workers.md
      - Retrieving Results: guides/retrieving-results.md
  - Deployment:
      - Local Development: deployment/local.md
      - Cloud (AWS): deployment/cloud.md
  - Reference:
      - Configuration: reference/configuration.md
      - API Reference: reference/api.md
  - Blog:
      - Building Scythe: blog/building-scythe.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append('../')
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            members_order: source

theme:
  name: material
  feature:
    tabs: true
  features:
    - content.code.annotate
    - content.code.copy
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.sections
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/szvsw/scythe
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/scythe-engine

markdown_extensions:
  - toc:
      permalink: "#"
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
